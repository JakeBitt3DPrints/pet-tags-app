<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Dashboard | JakeBitt 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold italic text-slate-800">My Pack</h1>
            <button onclick="logout()" class="text-xs font-bold text-slate-400 border border-slate-300 px-3 py-1 rounded-full uppercase">Logout</button>
        </header>
        <div id="pet-container" class="space-y-6"></div>
        <div class="mt-12 p-8 bg-white rounded-[2.5rem] shadow-sm border border-slate-200 text-black">
            <h3 class="font-black text-sm uppercase mb-4 text-slate-400">Add New Tag</h3>
            <input id="new-tag-id" type="text" placeholder="Enter ID (e.g. DOG-1234)" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 border-none font-bold outline-none">
            <button onclick="claimTag()" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg transition-all">LINK NEW TAG</button>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://aoiocladruutzrwwhdlh.supabase.co';
        const supabaseKey = 'sb_publishable_OygI1U0pRKYj_jF6KaS4Ww_XekkpecO';
        const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function loadDashboard() {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) { window.location.href = "/login.html"; return; }

            const { data: pets } = await supabase.from('pets').select('*').eq('owner_id', user.id);
            const container = document.getElementById('pet-container');

            if (!pets || pets.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 italic font-medium">No pets linked yet.</div>`;
                return;
            }

            container.innerHTML = pets.map(pet => `
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden text-black">
                    <div class="${pet.is_lost ? 'bg-red-600' : 'bg-slate-900'} p-4 text-white flex justify-between items-center">
                        <span class="font-black ml-2">${pet.tag_id}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black uppercase">${pet.is_lost ? 'Lost' : 'Safe'}</span>
                            <input type="checkbox" onchange="toggleLost('${pet.id}', ${pet.is_lost})" ${pet.is_lost ? 'checked' : ''} class="w-6 h-6 accent-white cursor-pointer">
                        </div>
                    </div>
                    <div class="p-8 space-y-5">
                        <input id="name-${pet.id}" type="text" value="${pet.pet_name || ''}" placeholder="Pet Name" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-lg">
                        <input id="phone-${pet.id}" type="text" value="${pet.owner_phone || ''}" placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-lg">
                        <textarea id="addr-${pet.id}" placeholder="Address/Message" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-medium text-sm h-24">${pet.address || ''}</textarea>
                        <button onclick="savePet('${pet.id}')" class="w-full bg-green-500 text-white font-black py-5 rounded-3xl shadow-xl uppercase tracking-widest">Save & Finish</button>
                    </div>
                </div>
            `).join('');
        }

        async function savePet(id) {
            const updates = {
                pet_name: document.getElementById(`name-${id}`).value,
                owner_phone: document.getElementById(`phone-${id}`).value,
                address: document.getElementById(`addr-${id}`).value
            };
            const { error } = await supabase.from('pets').update(updates).eq('id', id);
            if (error) alert("Error!"); else window.location.href = "/success.html";
        }

        async function toggleLost(id, currentStatus) {
            await supabase.from('pets').update({ is_lost: !currentStatus }).eq('id', id);
            loadDashboard();
        }

        async function claimTag() {
            const tagId = document.getElementById('new-tag-id').value.toUpperCase().trim();
            const { data: { user } } = await supabase.auth.getUser();
            const { error } = await supabase.from('pets').update({ owner_id: user.id }).eq('tag_id', tagId).is('owner_id', null);
            if (error) alert("Tag already claimed or not found."); else loadDashboard();
        }

        async function logout() { await supabase.auth.signOut(); window.location.href = "/login.html"; }
        loadDashboard();
    </script>
</body>
</html>
