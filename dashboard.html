<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Dashboard | JakeBitt 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold italic text-slate-800">My Pack</h1>
            <button id="logout-btn" class="text-xs font-bold text-slate-400 border border-slate-300 px-3 py-1 rounded-full uppercase">Logout</button>
        </header>

        <div id="pet-container" class="space-y-6">
            <p id="loading-text" class="text-slate-400 animate-pulse text-center italic">Checking your pets...</p>
        </div>

        <div class="mt-12 p-8 bg-white rounded-[2.5rem] shadow-sm border border-slate-200">
            <h3 class="font-black text-sm uppercase mb-4 text-slate-400">Add New Tag</h3>
            <input id="new-tag-id" type="text" placeholder="e.g. TEST-8035" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 border-none font-bold outline-none text-black">
            <button id="claim-btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg active:scale-95 transition-all">LINK NEW TAG</button>
        </div>
    </div>

    <script data-cfasync="false">
        const supabaseUrl = 'https://aoiocladruutzrwwhdlh.supabase.co';
        const supabaseKey = 'sb_publishable_OygI1U0pRKYj_jF6KaS4Ww_XekkpecO';
        const petSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        async function initDashboard() {
            await new Promise(r => setTimeout(r, 600)); // Wait for session recovery
            const { data: { user } } = await petSupabase.auth.getUser();

            if (!user) {
                window.location.href = "/login.html";
                return;
            }
            loadPets(user.id);
        }

        async function loadPets(userId) {
            const { data: pets, error } = await petSupabase
                .from('pets')
                .select('*')
                .eq('owner_id', userId);

            const container = document.getElementById('pet-container');
            if (error) { console.error(error); return; }

            if (!pets || pets.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 italic">No tags linked. Enter an ID below to start.</div>`;
                return;
            }

            container.innerHTML = pets.map(pet => `
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden text-black mb-4">
                    <div class="${pet.is_lost ? 'bg-red-600' : 'bg-slate-900'} p-4 text-white flex justify-between items-center">
                        <span class="font-black ml-2 uppercase">${pet.tag_id}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black uppercase">${pet.is_lost ? 'Lost' : 'Safe'}</span>
                            <input type="checkbox" onclick="toggleLost('${pet.id}', ${pet.is_lost})" ${pet.is_lost ? 'checked' : ''} class="w-5 h-5 accent-white">
                        </div>
                    </div>
                    <div class="p-6 space-y-4">
                        <input id="name-${pet.id}" type="text" value="${pet.pet_name || ''}" placeholder="Pet Name" class="w-full p-3 bg-slate-50 rounded-xl border-none font-bold text-black">
                        <input id="phone-${pet.id}" type="text" value="${pet.owner_phone || ''}" placeholder="Phone Number" class="w-full p-3 bg-slate-50 rounded-xl border-none font-bold text-black">
                        <textarea id="addr-${pet.id}" placeholder="Address/Message" class="w-full p-3 bg-slate-50 rounded-xl border-none text-sm h-20 text-black">${pet.address || ''}</textarea>
                        <button onclick="savePet('${pet.id}')" class="w-full bg-green-500 text-white font-black py-4 rounded-2xl uppercase tracking-widest text-sm">Save Changes</button>
                    </div>
                </div>
            `).join('');
        }

        // --- THE UPDATED CLAIM LOGIC ---
        document.getElementById('claim-btn').addEventListener('click', async () => {
            const tagInput = document.getElementById('new-tag-id');
            const tagId = tagInput.value.trim().toUpperCase();
            const btn = document.getElementById('claim-btn');

            if (!tagId) return;

            btn.innerText = "LINKING...";
            btn.disabled = true;

            const { data: { user } } = await petSupabase.auth.getUser();

            // Try to Update: Match tag_id AND ensure owner_id is NULL
            const { data, error } = await petSupabase
                .from('pets')
                .update({ owner_id: user.id })
                .eq('tag_id', tagId)
                .is('owner_id', null)
                .select();

            if (error) {
                console.error("Link Error:", error);
                alert("Database Error: " + error.message);
            } else if (data && data.length > 0) {
                alert("Success! Tag added to your pack.");
                tagInput.value = "";
                loadPets(user.id);
            } else {
                alert("Could not link tag. Check the ID or it may already be claimed.");
            }

            btn.innerText = "LINK NEW TAG";
            btn.disabled = false;
        });

        async function savePet(id) {
            const updates = {
                pet_name: document.getElementById(`name-${id}`).value,
                owner_phone: document.getElementById(`phone-${id}`).value,
                address: document.getElementById(`addr-${id}`).value
            };
            const { error } = await petSupabase.from('pets').update(updates).eq('id', id);
            if (error) alert("Save failed!"); else alert("Saved successfully!");
        }

        async function toggleLost(id, currentStatus) {
            await petSupabase.from('pets').update({ is_lost: !currentStatus }).eq('id', id);
            initDashboard();
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await petSupabase.auth.signOut();
            window.location.href = "/login.html";
        });

        initDashboard();
    </script>
</body>
</html>
