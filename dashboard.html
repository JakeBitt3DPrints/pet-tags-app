<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet Dashboard | JakeBitt 3D</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script data-cfasync="false" src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-50 min-h-screen font-sans pb-20">
    <div class="max-w-md mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold italic text-slate-800">My Pack</h1>
            <button id="logout-btn" class="text-xs font-bold text-slate-400 border border-slate-300 px-3 py-1 rounded-full uppercase">Logout</button>
        </header>

        <div id="pet-container" class="space-y-6 text-black">
            <p id="loading-text" class="text-slate-400 animate-pulse text-center italic">Syncing with database...</p>
        </div>

        <div class="mt-12 p-8 bg-white rounded-[2.5rem] shadow-sm border border-slate-200">
            <h3 class="font-black text-sm uppercase mb-4 text-slate-400">Add New Tag</h3>
            <input id="new-tag-id" type="text" placeholder="Enter ID (e.g. TEST-8035)" class="w-full p-4 bg-slate-100 rounded-2xl mb-4 border-none font-bold outline-none text-black">
            <button id="claim-btn" class="w-full bg-blue-600 text-white font-black py-4 rounded-2xl shadow-lg transition-all">LINK NEW TAG</button>
        </div>
    </div>

    <script data-cfasync="false">
        const supabaseUrl = 'https://aoiocladruutzrwwhdlh.supabase.co';
        const supabaseKey = 'sb_publishable_OygI1U0pRKYj_jF6KaS4Ww_XekkpecO';
        const petSupabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        // --- 1. SESSION & LOADING ---
        async function initDashboard() {
            // Give Supabase a half-second to find the session after a refresh
            await new Promise(r => setTimeout(r, 500));
            
            const { data: { user }, error: authError } = await petSupabase.auth.getUser();

            if (!user || authError) {
                console.log("No user found, redirecting to login...");
                window.location.href = "/login.html";
                return;
            }

            console.log("Logged in as:", user.email);
            loadPets(user.id);
        }

        // --- 2. LOAD PETS ---
        async function loadPets(userId) {
            const { data: pets, error } = await petSupabase
                .from('pets')
                .select('*')
                .eq('owner_id', userId);

            const container = document.getElementById('pet-container');
            
            if (error) {
                container.innerHTML = `<p class="text-red-500">Error loading pets: ${error.message}</p>`;
                return;
            }

            if (!pets || pets.length === 0) {
                container.innerHTML = `<div class="text-center py-10 text-slate-400 italic font-medium">No pets linked yet. Enter your Tag ID below!</div>`;
                return;
            }

            container.innerHTML = pets.map(pet => `
                <div class="bg-white rounded-[2.5rem] shadow-xl border border-white overflow-hidden">
                    <div class="${pet.is_lost ? 'bg-red-600' : 'bg-slate-900'} p-4 text-white flex justify-between items-center">
                        <span class="font-black ml-2 uppercase">${pet.tag_id}</span>
                        <div class="flex items-center gap-3">
                            <span class="text-[10px] font-black uppercase">${pet.is_lost ? 'Lost' : 'Safe'}</span>
                            <input type="checkbox" onclick="toggleLost('${pet.id}', ${pet.is_lost})" ${pet.is_lost ? 'checked' : ''} class="w-6 h-6 accent-white cursor-pointer">
                        </div>
                    </div>
                    <div class="p-8 space-y-5">
                        <input id="name-${pet.id}" type="text" value="${pet.pet_name || ''}" placeholder="Pet Name" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-lg text-black">
                        <input id="phone-${pet.id}" type="text" value="${pet.owner_phone || ''}" placeholder="Phone Number" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-bold text-lg text-black">
                        <textarea id="addr-${pet.id}" placeholder="Address/Message" class="w-full p-4 bg-slate-50 rounded-2xl border-none font-medium text-sm h-24 text-black">${pet.address || ''}</textarea>
                        <button onclick="savePet('${pet.id}')" class="w-full bg-green-500 text-white font-black py-5 rounded-3xl shadow-xl uppercase tracking-widest">Save & Finish</button>
                    </div>
                </div>
            `).join('');
        }

        // --- 3. CLAIM/ADD TAG ---
        document.getElementById('claim-btn').addEventListener('click', async () => {
            const tagInput = document.getElementById('new-tag-id');
            const tagId = tagInput.value.trim().toUpperCase();
            
            if (!tagId) { alert("Please enter a Tag ID!"); return; }

            const { data: { user } } = await petSupabase.auth.getUser();

            // This updates the pet record only if owner_id is currently NULL
            const { data, error } = await petSupabase
                .from('pets')
                .update({ owner_id: user.id })
                .eq('tag_id', tagId)
                .is('owner_id', null)
                .select();

            if (error) {
                alert("Database Error: " + error.message);
            } else if (data && data.length > 0) {
                alert("Success! Tag linked to your account.");
                tagInput.value = "";
                loadPets(user.id); // Refresh the list
            } else {
                alert("Could not link tag. Check if the ID is correct or if it's already claimed by someone else.");
            }
        });

        // --- 4. UTILITIES (Save, Toggle, Logout) ---
        async function savePet(id) {
            const updates = {
                pet_name: document.getElementById(`name-${id}`).value,
                owner_phone: document.getElementById(`phone-${id}`).value,
                address: document.getElementById(`addr-${id}`).value
            };
            const { error } = await petSupabase.from('pets').update(updates).eq('id', id);
            if (error) alert("Save failed: " + error.message); 
            else window.location.href = "/success.html";
        }

        async function toggleLost(id, currentStatus) {
            await petSupabase.from('pets').update({ is_lost: !currentStatus }).eq('id', id);
            const { data: { user } } = await petSupabase.auth.getUser();
            loadPets(user.id);
        }

        document.getElementById('logout-btn').addEventListener('click', async () => {
            await petSupabase.auth.signOut();
            window.location.href = "/login.html";
        });

        // Run on page load
        initDashboard();
    </script>
</body>
</html>
