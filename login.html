<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Pet Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="bg-white p-10 rounded-[3rem] shadow-2xl w-full max-w-sm text-center border border-white">
        <div class="text-5xl mb-4">🔑</div>
        <h1 class="text-3xl font-black mb-2 italic text-slate-800">Pet Portal</h1>
        <p class="text-slate-500 mb-8 text-sm font-medium">Enter your email. We'll send you a "Magic Link" to sign in instantly.</p>
        
        <div class="space-y-4">
            <input 
                id="email" 
                type="email" 
                placeholder="dog-mom@email.com" 
                class="w-full p-5 rounded-2xl border border-slate-200 bg-slate-50 font-bold focus:ring-2 focus:ring-blue-500 outline-none transition-all"
            >
            
            <button 
                id="login-btn"
                onclick="login()" 
                class="w-full bg-slate-900 text-white font-black py-5 rounded-2xl shadow-lg hover:bg-slate-800 active:scale-95 transition-all uppercase tracking-widest"
            >
                Send Login Link
            </button>
        </div>

        <p id="msg" class="mt-6 text-sm font-bold text-blue-600 min-h-[1.25rem]"></p>
        
        <div class="mt-8 pt-6 border-t border-slate-100">
            <p class="text-[10px] text-slate-400 font-bold uppercase tracking-tighter">Powered by JakeBitt 3D Prints</p>
        </div>
    </div>

    <script>
        // Initialize Supabase
        const supabaseUrl = 'https://aoiocladruutzrwwndlh.supabase.co';
        const supabaseKey = 'sb_publishable_OygI1U0pRKYj_jF6KaS4Ww_XekkpecO';
        const supabase = supabase.createClient(supabaseUrl, supabaseKey);

        async function login() {
            const emailInput = document.getElementById('email');
            const btn = document.getElementById('login-btn');
            const msg = document.getElementById('msg');
            
            const email = emailInput.value.trim();

            if (!email) {
                alert("Please enter your email address!");
                return;
            }

            // UI Loading State
            btn.innerText = "SENDING...";
            btn.disabled = true;
            btn.classList.add('opacity-50');

            // Send Magic Link
            const { error } = await supabase.auth.signInWithOtp({
                email: email,
                options: {
                    // CHANGE THIS to your actual domain once live
                    emailRedirectTo: window.location.origin + '/dashboard.html'
                }
            });

            if (error) {
                msg.innerText = "❌ " + error.message;
                msg.classList.replace('text-blue-600', 'text-red-600');
                btn.innerText = "SEND LOGIN LINK";
                btn.disabled = false;
                btn.classList.remove('opacity-50');
            } else {
                msg.innerText = "📧 Check your inbox! We sent you a link.";
                emailInput.value = "";
                btn.innerText = "LINK SENT!";
            }
        }

        // Auto-check: If user is already logged in, send them to dashboard
        async function checkUser() {
            const { data } = await supabase.auth.getSession();
            if (data.session) {
                window.location.href = "/dashboard.html";
            }
        }
        checkUser();
    </script>
</body>
</html>
