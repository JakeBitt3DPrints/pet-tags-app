<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pet ID Tag | JakeBitt3DPrints</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>.glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); }</style>
</head>
<body class="bg-slate-100 min-h-screen flex items-center justify-center p-4 font-sans">
    <div class="glass w-full max-w-md rounded-[3rem] shadow-2xl border border-white overflow-hidden text-center">
        <div id="lost-banner" class="hidden bg-red-600 text-white py-3 font-black animate-pulse uppercase">🚨 Pet is Lost! 🚨</div>
        
        <div class="p-8">
            <div class="w-32 h-32 bg-slate-200 rounded-full mx-auto mb-4 border-4 border-white shadow-lg flex items-center justify-center text-5xl">🐾</div>
            <h1 id="pet-name" class="text-4xl font-black text-slate-800 italic">Searching...</h1>
            <p id="tag-id-display" class="text-slate-400 font-mono text-sm uppercase mt-1 tracking-tighter"></p>
        </div>

        <div class="px-8 pb-10 space-y-4 text-left">
            <a id="call-btn" href="#" class="flex items-center justify-center gap-3 bg-green-500 text-white text-xl font-bold py-5 rounded-3xl shadow-lg active:scale-95 transition-transform">
                📞 Call Owner
            </a>
            <div class="bg-white/50 p-6 rounded-3xl border border-slate-200">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest mb-1">Message / Home</h3>
                <p id="pet-address" class="text-slate-700 font-medium">Checking the database...</p>
            </div>
            <a id="claim-section" href="/login.html" class="hidden block w-full text-center bg-amber-400 text-amber-900 font-black py-4 rounded-3xl border-2 border-amber-500 border-dashed">
                ✨ SET UP THIS TAG
            </a>
        </div>
    </div>

    <script>
        const supabase = supabase.createClient('https://aoiocladruutzrwwndlh.supabase.co', 'sb_publishable_OygI1U0pRKYj_jF6KaS4Ww_XekkpecO');
        const urlParams = new URLSearchParams(window.location.search);
        const tagId = urlParams.get('id');

        async function init() {
            if (!tagId) { document.getElementById('pet-name').innerText = "Scan a Tag!"; return; }
            document.getElementById('tag-id-display').innerText = `Tag ID: ${tagId}`;

            const { data, error } = await supabase.from('pets').select('*').eq('tag_id', tagId).single();

            if (data) {
                document.getElementById('pet-name').innerText = data.pet_name || "New Pet";
                document.getElementById('pet-address').innerText = data.address || "Owner hasn't added a message yet.";
                document.getElementById('call-btn').href = `tel:${data.owner_phone}`;
                if (data.is_lost) document.getElementById('lost-banner').classList.remove('hidden');
                if (!data.owner_id) document.getElementById('claim-section').classList.remove('hidden');
            } else {
                document.getElementById('pet-name').innerText = "Unregistered Tag";
                document.getElementById('pet-address').innerText = "This ID does not exist in the system yet.";
            }
        }
        init();
    </script>
</body>
</html>
